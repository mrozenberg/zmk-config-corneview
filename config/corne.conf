# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# Set the memory pool size for the display to 4.5KB (enough for a 128x64 monochrome display)
# This should rememdy the fickering issue with the nice!view displays
CONFIG_LV_Z_MEM_POOL_SIZE=4608
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Set deep sleep to 30 minutes
#CONFIG_ZMK_SLEEP=y
#CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Make Bluetooth stronger
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Change board name
CONFIG_ZMK_KEYBOARD_NAME="Corne View"

# Enable mouse movement
CONFIG_ZMK_POINTING=y