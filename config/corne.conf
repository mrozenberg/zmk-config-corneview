# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

CONFIG_ZMK_DISPLAY=y

# Isolate display rendering from radio/BLE to prevent flicker
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Limit to 5fps — nice!view only needs to update on state changes, not continuously
CONFIG_ZMK_DISPLAY_FRAME_RATE_LIMIT=5

# 8KB LVGL heap — enough for 160x68 monochrome + overhead without fragmentation
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# Set deep sleep to 30 minutes
#CONFIG_ZMK_SLEEP=y
#CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Make Bluetooth stronger
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Change board name
CONFIG_ZMK_KEYBOARD_NAME="Corne View"

# Enable mouse movement
CONFIG_ZMK_POINTING=y